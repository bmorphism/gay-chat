name: Decision
description: Retain a decision that updates the shared worldview.
title: "[Decision]: "
labels: ["type:decision", "phase:retention"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
    validations: { required: true }
  - type: textarea
    id: decision
    attributes:
      label: Decision
    validations: { required: true }
  - type: textarea
    id: linked_feedback
    attributes:
      label: Linked feedback / experiment / obstruction
    validations: { required: true }
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
    validations: { required: true }
  - type: textarea
    id: retrospective_path
    attributes:
      label: Retrospective path
      description: When and how will this decision be revisited?
    validations: { required: true }
